<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Azure Cloud Protection Workshop Lab Architecture</title>
  <desc id="desc">Architecture diagram showing the Azure resources deployed for the Cortex Cloud Azure lab.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <linearGradient id="tenantBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#ddeafe"/>
    </linearGradient>
    <linearGradient id="subscriptionBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fbff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#9fb7d8" flood-opacity="0.35"/>
    </filter>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #15314b; }
      .heading { font-size: 32px; font-weight: 700; }
      .subheading { font-size: 20px; font-weight: 600; fill: #2d6ac8; }
      .label { font-size: 18px; font-weight: 600; }
      .small { font-size: 15px; fill: #4a627d; }
      .tiny { font-size: 13px; fill: #5c7289; }
      .card { fill: #ffffff; stroke: #9bc0f6; stroke-width: 2; rx: 22; }
      .group { fill: #ffffff; stroke: #5bbf90; stroke-width: 3; stroke-dasharray: 10 8; rx: 20; }
      .pill { fill: #edf4ff; stroke: #b7cff8; stroke-width: 2; rx: 18; }
      .accent { fill: #2d6ac8; }
      .muted { fill: #5c7289; }
      .stroke-accent { stroke: #2d6ac8; stroke-width: 4; fill: none; }
      .stroke-link { stroke: #2c425f; stroke-width: 5; fill: none; marker-end: url(#arrow); }
      .stroke-peer { stroke: #5a85c7; stroke-width: 3; fill: none; stroke-dasharray: 9 7; marker-end: url(#arrowSmall); marker-start: url(#arrowSmall); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2c425f"/>
    </marker>
    <marker id="arrowSmall" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a85c7"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="url(#bg)"/>

  <text x="56" y="68" class="heading">Azure Cloud Protection Workshop</text>
  <text x="56" y="102" class="small">Lab environment deployed by the ARM template for modules 1 through 10</text>

  <g filter="url(#shadow)">
    <rect x="1090" y="30" width="450" height="165" rx="26" fill="url(#tenantBg)" stroke="#8fb4ea" stroke-width="2.5"/>
  </g>
  <text x="1160" y="76" class="subheading">Microsoft Entra ID Tenant</text>
  <g transform="translate(1128 92)">
    <circle cx="34" cy="36" r="16" fill="#3bb3e6"/>
    <path d="M10 82 C12 57, 56 57, 58 82" fill="#59c1eb"/>
    <circle cx="128" cy="36" r="16" fill="#1f9bd3"/>
    <circle cx="157" cy="42" r="11" fill="#4fc0ec"/>
    <path d="M104 82 C108 56, 150 56, 152 82" fill="#2ca8de"/>
    <path d="M142 82 C144 65, 176 65, 176 82" fill="#65c8ef"/>
    <rect x="238" y="24" width="44" height="44" rx="6" fill="#6ba6ff"/>
    <path d="M252 24 V68 M268 24 V68 M238 40 H282 M238 56 H282" stroke="#dbe8ff" stroke-width="3"/>
    <path d="M352 20 L374 32 L374 57 C374 71 364 82 352 89 C340 82 330 71 330 57 L330 32 Z" fill="#ffcc2f"/>
    <circle cx="352" cy="51" r="10" fill="#fff0b5"/>
    <rect x="349" y="59" width="6" height="12" rx="3" fill="#fff0b5"/>
  </g>
  <text x="1130" y="170" class="small">Users, groups, apps, and service principals authenticate here</text>

  <path d="M1315 196 V248" class="stroke-link"/>

  <g filter="url(#shadow)">
    <rect x="26" y="250" width="1548" height="680" rx="30" fill="url(#subscriptionBg)" stroke="#7faee9" stroke-width="3"/>
  </g>

  <g transform="translate(52 282)">
    <path d="M42 36 C42 18, 58 4, 78 4 C92 4, 104 11, 111 22 C116 17, 123 14, 131 14 C148 14, 162 28, 162 46 C162 47, 162 48, 162 49 L42 49 C42 45, 42 41, 42 36 Z" fill="#ffffff" stroke="#356cc5" stroke-width="5"/>
    <path d="M84 22 L100 16 L117 34 L103 70 L86 52 Z" fill="#2d6ac8"/>
    <path d="M101 18 L118 34 L105 70 L97 61 Z" fill="#48b7ec"/>
  </g>
  <text x="170" y="316" class="heading" style="font-size: 28px;">Azure Subscription</text>
  <text x="170" y="346" class="small">Resource group contains networking, compute, container, app, and data services used across the lab</text>

