    <text x="836" y="814" class="small">cortex-lab-app-*</text>

    <rect x="950" y="684" width="92" height="92" rx="18" fill="#ffffff" stroke="#8cb4f1" stroke-width="2"/>
    <path d="M980 702 L1011 702 L1000 723 L1018 723 L986 760 L993 734 L976 734 Z" fill="#ffbf1f"/>
    <text x="956" y="792" class="label">Function App</text>
    <text x="959" y="814" class="small">cortex-lab-fa-*</text>
  </g>

  <g>
    <rect x="1100" y="380" width="390" height="188" class="group"/>
    <text x="1128" y="404" class="subheading">Data Services</text>

    <rect x="1128" y="446" width="108" height="88" rx="18" fill="#ffffff" stroke="#8cb4f1" stroke-width="2"/>
    <ellipse cx="1182" cy="470" rx="28" ry="12" fill="#3aa7e2"/>
    <rect x="1154" y="470" width="56" height="34" fill="#2d6ac8"/>
    <ellipse cx="1182" cy="504" rx="28" ry="12" fill="#1b5bb8"/>
    <text x="1160" y="556" class="label">SQL</text>
    <text x="1138" y="578" class="small">Server + DB</text>

    <rect x="1260" y="446" width="108" height="88" rx="18" fill="#ffffff" stroke="#8cb4f1" stroke-width="2"/>
    <rect x="1287" y="462" width="54" height="44" rx="8" fill="#54c8de"/>
    <rect x="1295" y="474" width="38" height="8" rx="4" fill="#baf0ff"/>
    <rect x="1295" y="490" width="30" height="8" rx="4" fill="#baf0ff"/>
    <text x="1270" y="556" class="label">Storage</text>
    <text x="1268" y="578" class="small">Public blob access</text>

    <rect x="1382" y="446" width="86" height="88" rx="18" fill="#ffffff" stroke="#8cb4f1" stroke-width="2"/>
    <path d="M1425 462 C1442 462, 1456 476, 1456 493 C1456 509, 1442 523, 1425 523 C1408 523, 1394 509, 1394 493 C1394 476, 1408 462, 1425 462 Z" fill="#f4c23e"/>
    <path d="M1425 486 C1432 486, 1437 491, 1437 498 C1437 505, 1432 510, 1425 510 C1418 510, 1413 505, 1413 498 C1413 491, 1418 486, 1425 486 Z" fill="#fff2ba"/>
    <rect x="1422" y="510" width="6" height="20" rx="3" fill="#fff2ba"/>
    <text x="1396" y="556" class="label">Key Vault</text>
    <text x="1397" y="578" class="small">Sample secrets</text>
  </g>

  <g>
    <rect x="1100" y="622" width="390" height="188" class="group"/>
    <text x="1128" y="646" class="subheading">Identity and Connectivity</text>

    <rect x="1128" y="686" width="156" height="86" rx="18" fill="#ffffff" stroke="#8cb4f1" stroke-width="2"/>
    <circle cx="1206" cy="722" r="24" fill="#2d6ac8" opacity="0.88"/>
    <path d="M1191 722 C1193 709, 1200 700, 1206 700 C1212 700, 1219 709, 1221 722 C1223 735, 1216 744, 1206 744 C1196 744, 1189 735, 1191 722 Z" fill="#b8d7ff"/>
    <text x="1147" y="790" class="label">Deployment Identity</text>
    <text x="1160" y="812" class="small">User-assigned managed identity</text>

    <rect x="1310" y="686" width="150" height="86" rx="18" fill="#ffffff" stroke="#8cb4f1" stroke-width="2"/>
    <circle cx="1355" cy="717" r="12" fill="#53b8ef"/>
    <circle cx="1412" cy="717" r="12" fill="#2d6ac8"/>
    <path d="M1367 717 H1400" stroke="#8cb4f1" stroke-width="5" stroke-linecap="round"/>
    <text x="1331" y="790" class="label">VNet Peering</text>
    <text x="1341" y="812" class="small">Compute and AKS networks</text>
