    <text x="354" y="722" class="small">cortex-linux-*</text>

    <path d="M128 748 C132 716, 184 712, 194 746 C197 764, 182 782, 160 786 C138 790, 118 776, 128 748 Z" fill="#2d6ac8" opacity="0.15"/>
    <path d="M150 728 L185 740 L180 776 L147 790 L116 776 L111 742 Z" fill="#2d6ac8" opacity="0.85"/>
    <path d="M150 742 L166 747 L164 770 L149 777 L135 771 L132 748 Z" fill="#8fd0f4"/>
    <text x="196" y="778" class="label">cortex-lab-nsg</text>
    <text x="196" y="802" class="small">Inbound lab rules: 22, 3389, 80, 443, 4200</text>
  </g>

  <g>
    <rect x="622" y="380" width="430" height="208" class="group"/>
    <text x="650" y="404" class="subheading">Container Services</text>

    <rect x="652" y="444" width="150" height="108" rx="20" fill="#ffffff" stroke="#8cb4f1" stroke-width="2"/>
    <ellipse cx="727" cy="486" rx="34" ry="20" fill="#3aa7e2"/>
    <rect x="702" y="489" width="50" height="22" rx="10" fill="#5bc2ef"/>
    <rect x="692" y="519" width="20" height="18" fill="#8796a8"/>
    <rect x="714" y="519" width="20" height="18" fill="#6d7f93"/>
    <rect x="736" y="519" width="20" height="18" fill="#8796a8"/>
    <text x="694" y="570" class="label">ACR</text>
    <text x="677" y="592" class="small">cortexlabcr*</text>

    <rect x="830" y="444" width="184" height="108" rx="20" fill="#ffffff" stroke="#8cb4f1" stroke-width="2"/>
    <rect x="872" y="468" width="26" height="26" fill="#7a58d1"/>
    <rect x="905" y="468" width="26" height="26" fill="#8b68dd"/>
    <rect x="938" y="468" width="26" height="26" fill="#9c7bea"/>
    <rect x="888" y="500" width="26" height="26" fill="#8b68dd"/>
    <rect x="921" y="500" width="26" height="26" fill="#7a58d1"/>
