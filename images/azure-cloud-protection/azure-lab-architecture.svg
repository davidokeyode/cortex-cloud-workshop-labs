    <text x="846" y="592" class="small">cortex-lab-aks-* with 2 nodes</text>
  </g>

  <g>
    <rect x="622" y="622" width="430" height="188" class="group"/>
    <text x="650" y="646" class="subheading">App Services</text>

    <rect x="650" y="684" width="168" height="92" rx="18" fill="#ffffff" stroke="#8cb4f1" stroke-width="2"/>
    <rect x="700" y="710" width="66" height="34" rx="10" fill="#2d6ac8" opacity="0.88"/>
    <path d="M716 719 C718 708, 728 702, 738 702 C750 702, 758 711, 760 720 C770 721, 777 728, 777 738 C777 749, 768 758, 756 758 H718 C705 758, 694 748, 694 735 C694 724, 703 715, 714 715 Z" fill="#73c7f2"/>
