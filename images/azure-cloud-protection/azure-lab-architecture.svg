    <rect x="112" y="430" width="420" height="66" class="pill"/>
    <text x="140" y="470" class="label">cortex-lab-vnet</text>
    <text x="360" y="470" class="small">10.10.0.0/16</text>

    <rect x="132" y="522" width="380" height="228" rx="22" fill="#eef4ff" stroke="#c2d7fb" stroke-width="2"/>
    <text x="156" y="552" class="label">default subnet</text>
    <text x="316" y="552" class="small">10.10.1.0/24</text>

    <rect x="164" y="585" width="140" height="88" rx="18" fill="#ffffff" stroke="#8cb4f1" stroke-width="2"/>
    <rect x="206" y="606" width="56" height="36" rx="6" fill="#53b8ef"/>
    <rect x="197" y="647" width="74" height="8" rx="4" fill="#a4bddb"/>
    <text x="178" y="700" class="label">Windows VM</text>
    <text x="176" y="722" class="small">cortex-win-*</text>

    <rect x="340" y="585" width="140" height="88" rx="18" fill="#ffffff" stroke="#8cb4f1" stroke-width="2"/>
    <rect x="382" y="606" width="56" height="36" rx="6" fill="#53b8ef"/>
    <rect x="373" y="647" width="74" height="8" rx="4" fill="#a4bddb"/>
