  <g>
    <rect x="662" y="270" width="350" height="90" class="pill"/>
    <text x="688" y="310" class="label">cortex-lab-aks-vnet</text>
    <text x="920" y="310" class="small">10.0.0.0/16</text>
    <text x="688" y="338" class="small">aks-subnet: 10.0.0.0/24</text>
  </g>

  <path d="M582 463 C620 438, 648 400, 680 340" class="stroke-peer"/>
  <path d="M741 360 C780 405, 812 436, 854 462" class="stroke-peer"/>

  <text x="620" y="900" class="small">Intentional lab misconfigurations include open NSG rules, permissive SQL exposure, public blob access, and relaxed web app security settings.</text>
  <text x="620" y="928" class="tiny">Resource names include unique suffixes at deployment time; the diagram shows their stable prefixes for readability.</text>
</svg>