    <text x="700" y="814" class="small">cortex-lab-splan</text>

    <rect x="842" y="684" width="92" height="92" rx="18" fill="#ffffff" stroke="#8cb4f1" stroke-width="2"/>
    <circle cx="888" cy="722" r="24" fill="#3f92ff"/>
    <path d="M865 722 H911 M888 699 V745" stroke="#dcedff" stroke-width="6" stroke-linecap="round"/>
