##############################################################################
# dvwa-deployment.yaml — Damn Vulnerable Web Application
# Deploys DVWA into a dedicated namespace for runtime security testing.
##############################################################################
apiVersion: v1
kind: Namespace
metadata:
  name: dvwa
  labels:
    app: dvwa
    purpose: security-testing
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dvwa
  namespace: dvwa
  labels:
    app: dvwa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dvwa
  template:
    metadata:
      labels:
        app: dvwa
    spec:
      containers:
      - name: dvwa
        image: vulnerables/web-dvwa:latest
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: MYSQL_HOSTNAME
          value: "127.0.0.1"
        - name: MYSQL_DATABASE
          value: "dvwa"
        - name: MYSQL_USERNAME
          value: "root"
        - name: MYSQL_PASSWORD
          value: "dvwa"
---
apiVersion: v1
kind: Service
metadata:
  name: dvwa-service
  namespace: dvwa
  labels:
    app: dvwa
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: dvwa
